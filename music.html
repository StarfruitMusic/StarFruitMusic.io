<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfruit - Music Archive</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- COLOR PALETTE -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'retro-bg': '#f7ce39',     
                        'nathan-purple': '#6D4DBD',     
                        'nathan-orange': '#F7BE20',     
                        'retro-ink': '#2C2A28',    
                        'retro-white': '#f0e2c3',    
                        'retro-yellow': '#F2B829', 
                        'retro-coral': '#E96A59',  
                        'retro-blue': '#5C8EBD'    
                    },
                    fontFamily: {
                        'mono': ['"My Cool Font"', 'monospace'],
                        'sans':['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
                font-family: 'My Cool Font'; /* You can name this whatever you want */
                src: url('fonts/JumperPERSONALUSEONLY-Black.ttf') format('truetype'); /* Change this to your exact file name! */
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }
        html, body { height: 100%; }
        body {
            background-color: #f0e8c3;
            background-image: 
                linear-gradient(rgba(44, 42, 40, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44, 42, 40, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col text-retro-ink">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 z-50 bg-[linear-gradient(to_bottom,#7CCDD9,#4AA1E8,#FF8E2B,#FFB82B,transparent)] pb-4">
        <div class="bg-nathan-orange/90 backdrop-blur-sm border-b-2 border-retro-ink">
            <div class="max-w-6xl mx-auto p-6 flex flex-col md:flex-row justify-between items-center font-mono uppercase font-bold">
                <a href="index.html" class="text-5xl tracking-tight mb-4 md:mb-0 flex items-center gap-2">
                    <span class="w-4 h-4 rounded-full border-2 border-retro-bg flex items-center justify-center">
                        <span class="w-1 h-1 bg-retro-bg rounded-full"></span>
                    </span>
                    Starfruit
                </a>
                <div class="flex gap-8 text-lg">
                    <a href="index.html#about" class="hover:text-retro-coral transition-colors">About</a>
                    <a href="index.html#projects" class="hover:text-retro-coral transition-colors">Projects</a>
                    <a href="index.html#contact" class="hover:text-retro-coral transition-colors">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto w-full px-6 py-12 flex-grow">

        <section class="mb-16">
            <div class="flex items-center gap-4 mb-4">
                <a href="index.html" class="bg-retro-ink text-retro-yellow px-4 py-2 font-mono font-bold uppercase hover:bg-retro-coral hover:text-white transition-colors border-2 border-retro-ink">
                    ← Back
                </a>
                <h1 class="bg-retro-white border-4 border-retro-ink shadow-[6px_6px_0px_#2C2A28] px-6 py-3 font-mono text-4xl text-retro-ink uppercase font-bold inline-block">
                    (Music Archive)
                </h1>
            </div>
            <p class="text-xl font-medium max-w-2xl bg-white/50 p-4 border-2 border-retro-ink border-dashed">
                A selection of our audio work categorized by genre. Click the yellow play buttons to preview the tracks.
            </p>
        </section>

        <!-- ALL MUSIC PLAYERS WILL BE AUTOMATICALLY INJECTED HERE -->
        <div id="music-library-container"></div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-retro-yellow text-retro-ink border-t-4 border-retro-ink p-8 mt-auto">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-end font-mono font-bold uppercase">
            <div class="mb-6 md:mb-0">
                <div class="flex items-center gap-2 mb-2 text-xl">
                    <span class="bg-retro-ink text-retro-yellow px-2 py-0.5">⚠</span> Michael Chen x Nathan Cheng
                </div>
                <p class="text-sm max-w-sm">Thank you for visiting my portfolio.</p>
            </div>
        </div>
    </footer>

    <!-- ========================================================= -->
    <!-- COMPONENT GENERATOR SCRIPT -->
    <!-- ========================================================= -->
    <script>
        // 1. ADD YOUR MUSIC HERE!
        // To add a new song, just copy a line inside "tracks" and change the text.
        // To add a new genre, just copy a whole block.
        const myMusic = [
            {
                genre: "Combat / Action",
                color: "bg-retro-coral", // Header and progress bar color
                tracks: [
                    { id: "Track 01", title: "Acid Rock", file: "stupid song 10.mp3" },
                    { id: "Track 02", title: "Cinemetal", file: "Emblazoned Ambition.opus" },
                    { id: "Track 03", title: "MetalCore", file: "jRock Riff 3.opus" }
                ]
            },
            {
                genre: "DigiFusion",
                color: "bg-nathan-purple", 
                tracks: [
                    { id: "Track 01", title: "Celestial", file: "prismatic-promenade.opus" },
                    { id: "Track 02", title: "Beach", file: "The-Beach-That-Makes-You-Fastloop.opus" },
                    { id: "Track 03", title: "Whimsy", file: "Pinwheel (1).opus" }
                ]
            },
            {
                genre: "Ambient",
                color: "bg-nathan-purple", 
                tracks: [
                    { id: "Track 01", title: "Cello", file: "Cello demo for overheat C minor.opus" },
                    { id: "Track 02", title: "Massive", file: "Transclarity.mp3" },
                ]
            }
            
        ];

        // 2. THIS BUILDS THE HTML AUTOMATICALLY
        const container = document.getElementById('music-library-container');
        let htmlContent = '';

        myMusic.forEach(category => {
            // Build the Genre Header
            htmlContent += `
            <section class="mb-20">
                <div class="flex items-center gap-3 mb-6">
                    <span class="${category.color} text-white border-2 border-retro-ink px-4 py-1 font-mono font-bold uppercase text-xl shadow-[4px_4px_0px_#2C2A28]">
                        ■ ${category.genre}
                    </span>
                    <div class="h-1 flex-grow bg-retro-ink opacity-20"></div>
                </div>`;

            // Build each track inside this genre
            category.tracks.forEach(track => {
                htmlContent += `
                <div class="audio-player-module w-full border-4 border-retro-ink bg-retro-white p-4 mb-6 shadow-[6px_6px_0px_#2C2A28] flex flex-col md:flex-row items-center gap-6 relative group">
                    <button class="play-btn w-16 h-16 shrink-0 bg-retro-yellow border-4 border-retro-ink flex items-center justify-center shadow-[4px_4px_0px_#2C2A28] active:shadow-none active:translate-x-[2px] active:translate-y-[2px] transition-all">
                        <svg class="play-icon w-8 h-8 text-retro-ink fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg class="pause-icon hidden w-8 h-8 text-retro-ink fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <div class="flex-1 w-full font-mono">
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <!-- ADDED 'font-sans' HERE -->
                                <span class="font-sans text-[10px] uppercase font-bold text-retro-ink/50 block leading-none">${track.id}</span>
                                <span class="text-retro-ink font-bold uppercase tracking-tighter text-lg">${track.title}</span>
                            </div>
                            <!-- ADDED 'font-sans' HERE AS WELL FOR THE NUMBERS -->
                            <div class="font-sans timer text-xs font-bold text-retro-ink">00:00</div>
                        </div>
                        <div class="progress-container w-full h-6 border-2 border-retro-ink bg-retro-ink/5 relative cursor-pointer">
                            <div class="progress-bar h-full ${category.color} border-r-2 border-retro-ink" style="width: 0%"></div>
                        </div>
                    </div>
                    <audio class="main-audio" src="${track.file}"></audio>
                </div>`;
            });
            htmlContent += `</section>`;
        });

        // Inject all the HTML into the page
        container.innerHTML = htmlContent;

        // 3. ATTACH THE AUDIO LOGIC TO THE NEWLY CREATED PLAYERS
        document.querySelectorAll('.audio-player-module').forEach(module => {
            const audio = module.querySelector('.main-audio');
            const playBtn = module.querySelector('.play-btn');
            const playIcon = module.querySelector('.play-icon');
            const pauseIcon = module.querySelector('.pause-icon');
            const progressBar = module.querySelector('.progress-bar');
            const progressContainer = module.querySelector('.progress-container');
            const timer = module.querySelector('.timer');

            // Pause other tracks when playing
            audio.addEventListener('play', () => {
                document.querySelectorAll('.main-audio').forEach(otherAudio => {
                    if(otherAudio !== audio) otherAudio.pause();
                });
            });

            // Toggle play/pause
            playBtn.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());

            // UI updates
            audio.addEventListener('play', () => {
                playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden');
                playBtn.classList.replace('bg-retro-yellow', 'bg-retro-coral');
            });
            audio.addEventListener('pause', () => {
                playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden');
                playBtn.classList.replace('bg-retro-coral', 'bg-retro-yellow');
            });

            // Timer & Progress
            audio.addEventListener('timeupdate', () => {
                const duration = audio.duration || 1; 
                progressBar.style.width = ((audio.currentTime / duration) * 100) + '%';
                
                let mins = Math.floor(audio.currentTime / 60) || 0;
                let secs = Math.floor(audio.currentTime % 60) || 0;
                timer.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            });

            // Click to scrub
            progressContainer.addEventListener('click', (e) => {
                if(audio.duration) audio.currentTime = (e.offsetX / progressContainer.clientWidth) * audio.duration;
            });
            
            // Reset on end
            audio.addEventListener('ended', () => {
                progressBar.style.width = '0%'; audio.currentTime = 0;
            });
        });
    </script>
</body>
</html>
